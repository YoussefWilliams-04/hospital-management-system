{% extends "base.html" %}

{% block content %}

<h3 class="text-center">Edit Employee</h3>

<form method="POST">

    <div class="mb-2">
        <label>Name</label>
        <input type="text" name="name" value="{{ employee.name }}" class="form-control" required>
    </div>

    <div class="mb-2">
        <label>Role</label>
        <input type="text" name="role" value="{{ employee.role }}" class="form-control" required>
    </div>

    <div class="mb-2">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ employee.phone }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Department</label>
        <input type="text" name="department" value="{{ employee.department }}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Update</button>

</form>

{% endblock %}
