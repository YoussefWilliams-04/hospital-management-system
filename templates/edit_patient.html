{% extends "base.html" %}

{% block content %}
<h3 class="text-center"> Edit {{ patient.name}}'s account</h3>

<form method="POST">
    <div class="mb-2">
        <label>Name</label>
        <input type="text" name="name" value="{{ patient.name }}" class="form-control" required>
    </div>

    <div class="mb-2">
        <label>Age</label>
        <input type="number" name="age" value="{{ patient.age }}" class="form-control" required>
    </div>

    <div class="mb-2">
        <label>Phone</label>
        <input type="number" name="phone" value="{{ patient.phone }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Address</label>
        <input type="text" name="address" value="{{ patient.address }}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Update</button>
</form>

{% endblock %}
