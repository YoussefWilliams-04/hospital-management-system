<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS</title>

    <head></head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body class="bg-info">
    <div class="contaoner-fluid mt-2 p-3 bg-primary-subtle text-danger">
        <h1 class="text-center"> Hospital Management System </h1>
    </div>

    <div class="contaoner-fluid mt-2 p-3 bg-primary-subtle text-dark">
        <!-- Example single danger button -->


        <div class="btn-group">
            <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown"
                aria-expanded="false">
                Patient
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{url_for('patient.add_patient')}}">Add Patient</a></li>
                <li><a class="dropdown-item" href="{{url_for('patient.view_update_patient')}}">View and update
                        Patient</a></li>


        </div>

        {# Medicine module student removes this comment.
        <div class="btn-group">
            <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown"
                aria-expanded="false">
                Medicine

            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{url_for('medicine.add_medicine')}}">Add Medicine</a>
                <li><a class="dropdown-item" href="{{url_for('medicine.view_update_medicine')}}">View and update
                        Medicine</a> </li>

            </ul>
        </div>
        #}

        <div class="btn-group">
            <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown"
                aria-expanded="false">
                Employee
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{url_for('employee.add_employee')}}">Add Employee</a></li>
                <li><a class="dropdown-item" href="{{url_for('employee.view_update_employee')}}">View and update
                        Employee</a></li>

            </ul>
        </div>

        <div class="btn-group">
            <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown"
                aria-expanded="false">
                Bed
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{url_for('bed.add_bed')}}">Add bed</a></li>
                <li><a class="dropdown-item" href="{{url_for('bed.view_update_bed')}}">View and update
                        bed</a></li>

            </ul>
        </div>
    </div>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
